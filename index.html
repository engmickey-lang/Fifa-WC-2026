<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  
<style>
/* Mobile adjustments for the signature */
@media (max-width: 600px) {
  .signature {
    text-align: right;    
    line-height: 1.2;    
    z-index: 100;        
  }
}

.name-gold {
  color: var(--gold);
  font-weight: bold; 
}

:root{
  --bg:#08090e;--s1:#10131c;--s2:#161a26;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --gold:#f4c430;--gold2:#ffd84d;--gbg:rgba(244,196,48,.09);--gbdr:rgba(244,196,48,.26);
  --w:#edf0f8;--gr:#8892ad;--dim:#4a5268;
  --green:#2ed172;--grbg:rgba(46,209,114,.1);
  --red:#ff5050;--rdbg:rgba(255,80,80,.1);
  --blue:#5598f4;--blbg:rgba(85,152,244,.1);
  --live:#ff3030;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

/* HEADER */
.hdr{background:linear-gradient(180deg,#0d1020 0%,var(--bg) 100%);border-bottom:1px solid var(--bdr2);padding:20px 16px 14px;text-align:center;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.hdr-icon {
  display: block;
  margin: 0 auto 8px;
  height: 60px; 
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(244,196,48,0.4)); 
}
.hdr h1{font-family:'Bebas Neue';font-size:clamp(24px,6vw,48px);letter-spacing:4px;color:var(--gold);text-shadow:0 0 32px rgba(244,196,48,.3);line-height:1;}
.hdr-sub{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gr);text-transform:uppercase;margin-top:3px;}
.hdr-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:10px;}
.pill{background:rgba(255,255,255,.05);border:1px solid var(--bdr2);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600;color:var(--gr);}
.pill.g{background:var(--gbg);border-color:var(--gbdr);color:var(--gold);}

/* SBAR & TICKER */
.sbar{background:#0b0d17;border-bottom:1px solid var(--bdr);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:44px;}
.rfbtn{display:flex;align-items:center;gap:6px;background:var(--green);border:none;border-radius:7px;padding:6px 14px;font-family:'Inter';font-size:11px;font-weight:700;color:#000;cursor:pointer;text-transform:uppercase;letter-spacing:.6px;transition:filter .2s;}
.rfbtn:hover{filter:brightness(1.1);}
.rfbtn:disabled{opacity:.45;cursor:not-allowed;}
.btn-spin{width:11px;height:11px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sbar-txt{font-size:11px;color:var(--dim);}
.sbar-txt b{color:var(--green);}
.sbar-txt.err b{color:var(--red);}

/* GLOBAL LIVE TICKER */
.live-ticker {
  display: none;
  margin: 0 auto;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.live-ticker.active { display: flex; }
.ticker-match {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--rdbg);
  border: 1px solid rgba(255,48,48,.28);
  border-radius: 999px;
  padding: 3px 11px;
}
.ticker-dot { color: var(--live); font-size: 9px; animation: blink 1.2s ease-in-out infinite; }
.ticker-flag { font-size: 16px; line-height: 1; }
.ticker-code { font-weight: 700; font-size: 12px; letter-spacing: .5px; color: var(--w); }
.ticker-score { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--gold2); font-size: 14px; margin: 0 1px; }
.sbar-r{margin-left:auto;display:flex;align-items:center;gap:14px;}
.clk{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tabs {
  display: flex;
  overflow-x: auto;
  background: var(--bg);
  border-bottom: 1px solid var(--bdr);
  padding: 12px 16px;
  gap: 8px;
  justify-content: flex-start; 
  position: sticky;
  top: 0;
  z-index: 30;
}
@media (min-width: 600px) {
  .tabs { justify-content: center; } 
}
.tab {
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--dim);
  cursor: pointer;
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0; 
  transition: all 0.2s;
  font-family: 'Inter';
  text-transform: uppercase;
}
.tab:hover { background: var(--s2); color: var(--w); }
.tab.on { background: var(--gold); border-color: var(--gold); color: #000; }

/* CALENDAR STRIP */
.cal-strip {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 4px 0 16px 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--bdr);
  position: relative;
}
/* Floating "All days" toggle: sticks to the right edge while chips scroll. */
.cal-all {
  position: sticky;
  right: 0;
  flex-shrink: 0;
  align-self: stretch;
  z-index: 6;
  cursor: pointer;
  min-width: 64px;
  padding: 0 16px;
  border-radius: 12px;
  border: 1px solid var(--bdr2);
  background: var(--s2);
  color: var(--gr);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 1.2;
  box-shadow: -14px 0 16px -4px var(--bg);
  transition: all 0.2s;
}
.cal-all:hover { background: var(--s1); color: var(--w); border-color: var(--gr); }
.cal-all.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  box-shadow: -14px 0 16px -4px var(--bg), 0 4px 12px rgba(244,196,48,0.2);
}
.dc {
  flex-shrink: 0;
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 8px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 65px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.dc:hover { background: var(--s2); border-color: var(--bdr2); }
.dc.active {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 4px 12px rgba(244,196,48,0.2);
  transform: translateY(-2px);
}
.dc-dow { font-size: 10px; font-weight: 700; color: var(--gr); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.dc-day { font-family: 'Bebas Neue'; font-size: 24px; color: var(--w); line-height: 1; letter-spacing: 1px; }
.dc.active .dc-dow { color: rgba(0,0,0,0.6); }
.dc.active .dc-day { color: #000; }
.dc.today { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 4px 14px rgba(244,196,48,0.15); }
.dc-now { margin-top: 4px; font-size: 8px; font-weight: 800; letter-spacing: 0.8px; color: #000; background: var(--gold); border-radius: 6px; padding: 1px 5px; line-height: 1.4; }
.dc.active.today .dc-now { background: #000; color: var(--gold); }

@media (min-width: 768px) {
  .tabs, .cal-strip { scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
  .tabs::-webkit-scrollbar, .cal-strip::-webkit-scrollbar { height: 6px; display: block; }
  .tabs::-webkit-scrollbar-track, .cal-strip::-webkit-scrollbar-track { background: transparent; }
  .tabs::-webkit-scrollbar-thumb, .cal-strip::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 10px; }
  .tabs::-webkit-scrollbar-thumb:hover, .cal-strip::-webkit-scrollbar-thumb:hover { background: var(--gr); }
}
@media (max-width: 767px) {
  .tabs, .cal-strip { scrollbar-width: none; }
  .tabs::-webkit-scrollbar, .cal-strip::-webkit-scrollbar { display: none; }
}

/* PANELS */
.panel{display:none;padding:12px 14px;}
.panel.on{display:block;}
.note{background:var(--blbg);border:1px solid rgba(85,152,244,.2);border-radius:7px;padding:8px 12px;margin-bottom:12px;font-size:11px;font-weight:600;color:var(--blue);}
.loader{text-align:center;padding:48px 20px;color:var(--dim);}
.big-spin{width:30px;height:30px;border:3px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
.today-hd{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;}
.mc{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.mc.eg{background:var(--gbg);border-color:var(--gbdr);}
.mc.live{border-color:rgba(255,48,48,.35);background:rgba(255,48,48,.04);}
.mc.done{opacity:.72;}
.mc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mc-time{font-family:'JetBrains Mono';font-size:14px;font-weight:600;color:var(--gold);min-width:50px;flex-shrink:0;}
.mc-time.t-done{color:var(--green);}
.mc-time.t-live{color:var(--live);}
.mc-teams{flex:1;font-size:14px;font-weight:700;color:var(--w);}
.mc-score{font-family:'Bebas Neue';font-size:22px;color:var(--gold2);letter-spacing:2px;}
.mc-foot{display:flex;gap:7px;align-items:center;margin-top:4px;flex-wrap:wrap;font-size:11px;color:var(--dim);}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.t-g{background:var(--blbg);color:var(--blue);}
.t-ok{background:var(--grbg);color:var(--green);}
.t-lv{background:var(--rdbg);color:var(--live);}
.t-nx{background:rgba(255,255,255,.04);color:var(--dim);}
.ibox{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px;margin-top:8px;}
.ibox.gold{background:var(--gbg);border-color:var(--gbdr);}
.ilbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.ilbl.g{color:var(--gold);}
.irow{font-size:12px;color:var(--gr);line-height:2.1;}
.irow strong{color:var(--w);}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:10px;}
.gc{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.gc.eg{border-color:var(--gbdr);box-shadow:0 0 18px rgba(244,196,48,.06);}
.gc-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s2);border-bottom:1px solid var(--bdr);}
.gc-lbl{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--w);}
.gc.eg .gc-lbl{color:var(--gold);}
.eg-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--gbg);border:1px solid var(--gbdr);color:var(--gold);text-transform:uppercase;letter-spacing:.8px;}
table.st{width:100%;border-collapse:collapse;}
table.st th{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;padding:5px 10px;text-align:center;border-bottom:1px solid var(--bdr);}
table.st th:first-child{text-align:left;}
table.st td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-size:12px;color:var(--gr);}
table.st td:first-child{text-align:left;font-weight:600;color:var(--w);}
table.st tr:last-child td{border-bottom:none;}
table.st tr.egr td{color:var(--gold);}
.pts{font-family:'JetBrains Mono';font-weight:700;color:var(--w)!important;}
table.st tr.egr .pts{color:var(--gold)!important;}
.q1{border-left:3px solid var(--green);}
.q3{border-left:3px solid var(--gold);}
.el{border-left:3px solid transparent;}
.gc-ms{border-top:1px solid var(--bdr);}
.mi{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.mi:last-child{border-bottom:none;}
.mi.egm{background:rgba(244,196,48,.05);border-left:2px solid var(--gold);}
.mi-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mi-t{font-size:12px;font-weight:600;color:var(--w);}
.mi-s{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--gold2);}
.mi-bot{font-size:10px;color:var(--dim);margin-top:2px;}
.mi-dxb{color:var(--gold);font-weight:700;}
.sb{margin-bottom:22px;}
.sb-ttl{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--w);padding:8px 0 6px;border-bottom:1px solid var(--bdr);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.sp{font-size:9px;font-family:'Inter';font-weight:700;letter-spacing:1.2px;padding:2px 8px;border-radius:4px;text-transform:uppercase;}
.sp-g{background:var(--blbg);color:var(--blue);}
.sp-k{background:var(--rdbg);color:var(--red);}
.sp-f{background:var(--gbg);color:var(--gold);}
.sw{overflow-x:auto;}
table.ft{width:100%;border-collapse:collapse;min-width:420px;}
table.ft thead th{text-align:left;padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);background:var(--s2);border-bottom:1px solid var(--bdr2);}
table.ft tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
table.ft tbody tr:hover td{background:rgba(255,255,255,.02);}
table.ft tbody tr.dr td{color:var(--dim);}
table.ft tbody tr.er td{background:rgba(244,196,48,.06);}
table.ft tbody tr.lr td{background:rgba(255,48,48,.04);}
table.ft tbody tr.fr td{background:var(--gbg)!important;}
.tn{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);}
.tdt{font-size:11px;color:var(--gr);white-space:nowrap;}
.ttime{font-family:'JetBrains Mono';font-size:12px;font-weight:700;color:var(--gold);}
.tm2{font-weight:600;color:var(--w);font-size:13px;}
.tsc{font-family:'JetBrains Mono';font-weight:700;color:var(--gold2);font-size:12px;white-space:nowrap;}
.tv{font-size:11px;color:var(--dim);}
.gt{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--blbg);color:var(--blue);}

/* SIGNATURE */
.signature {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.5px;
}
.signature span {
  color: var(--gold);
  font-weight: 600;
}

/* DYNAMIC TAB ICON */
.cal-icon {
  display: inline-block;
  border: 1px solid var(--bdr);
  border-radius: 4px;
  text-align: center;
  line-height: 1;
  overflow: hidden;
  margin-right: 6px;
  vertical-align: middle;
  background: var(--s1);
  transform: translateY(-1px);
}
.cal-icon b {
  display: block;
  background: var(--red);
  color: #fff;
  font-size: 7px;
  padding: 2px 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cal-icon i {
  display: block;
  font-size: 9px;
  font-weight: 700;
  color: var(--w);
  padding: 2px 4px 1px;
  font-style: normal;
}

/* CONVERGING KNOCKOUT BRACKET */
.ko-controls {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.ko-zbtn {
  background: var(--s1);
  border: 1px solid var(--bdr2);
  color: var(--gr);
  border-radius: 8px;
  padding: 5px 11px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  min-width: 34px;
  transition: all 0.2s;
}
.ko-zbtn:hover { background: var(--s2); color: var(--w); border-color: var(--gr); }
.ko-zbtn.ko-fit { color: var(--gold); border-color: var(--gbdr); }
#koZoomLbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); min-width: 42px; text-align: center; }
.converging-bracket {
  display: flex;
  align-items: stretch;
  gap: 16px;
  overflow-x: auto;
  padding: 10px 10px 40px;
  position: relative;
}
.ko-svg {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 0;
}
.ko-line { fill: none; stroke: var(--dim); stroke-width: 1.5; opacity: .5; }
.ko-line.adv { stroke: var(--gold); stroke-width: 2.5; opacity: .95; filter: drop-shadow(0 0 3px rgba(244,196,48,.4)); }
.ko-line.loser { stroke: var(--red); stroke-width: 1.5; opacity: .4; stroke-dasharray: 4 4; }
.third-wrap { margin-top: 26px; width: 100%; }
.third-lbl {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1.5px;
  color: var(--gr);
  margin-bottom: 8px;
}
.bracket-col {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  width: 180px;
  position: relative;
  z-index: 1;
}
.b-title {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 1.5px;
  margin-bottom: 12px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--bdr);
}
.b-slots {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  flex: 1; 
  gap: 12px;
}
.b-match {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 8px 12px;
  position: relative;
}
.b-match.placeholder {
  border: 1px dashed var(--dim);
  background: rgba(255,255,255,0.02);
}
.b-meta {
  font-size: 9px;
  color: var(--dim);
  text-align: center;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  text-transform: uppercase;
  font-weight: 700;
}
.b-team {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--gr);
  margin-bottom: 4px;
}
.b-team:last-child { margin-bottom: 0; }
.b-team.winner { color: var(--w); font-weight: 700; }
.b-team.tbd { color: var(--dim); }
.b-score { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--gold2); display: flex; align-items: center;}
.b-pen { font-size: 10px; color: var(--gr); font-weight: 500; margin-left: 4px; }
.b-center {
  width: 240px;
}
.b-center-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
}

@media(max-width:768px){
  .live-ticker { width: 100%; order: 3; justify-content: center; }
}
@media(max-width:560px){.tv{display:none;}.gg{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="hdr">
<img class="hdr-icon" src="trophy.png" alt="World Cup Trophy">
  <h1>FIFA World Cup 2026</h1>
  <div class="hdr-sub">Canada · Mexico · United States</div>
  <div class="hdr-pills">
    <span class="pill">Jun 11 – Jul 19, 2026</span>
    <span class="pill">48 Teams · 104 Matches</span>
    <span class="pill g">🕐 Dubai Time (UTC+4)</span>
  </div>
<div class="signature">Developed by:<br><span class="name-gold">Eng. Mickey ;)</span></div>
</div>

<div class="sbar">
  <button class="rfbtn" id="rfBtn" onclick="loadData(true)">
    <span id="rfIco">↻</span> Refresh
  </button>
  <span class="sbar-txt" id="sbarTxt">Loading…</span>
  
  <div id="liveTicker" class="live-ticker"></div>

  <div class="sbar-r">
    <span class="clk" id="clk"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab on" id="todayTab" onclick="go('today',this)">Today</button>
  <button class="tab"     onclick="go('groups',this)">🏟 Groups</button>
  <button class="tab"     onclick="go('sched',this)">📋 Schedule</button>
  <button class="tab"     onclick="go('ko',this)">⚡ Knockout</button>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DATA SOURCE
// ══════════════════════════════════════════════════════════
const LOCAL_LIVE_URL = 'https://raw.githubusercontent.com/engmickey-lang/Fifa-WC-2026/main/live_scores.json';

// ══════════════════════════════════════════════════════════
// FLAGS & CONSTANTS
// ══════════════════════════════════════════════════════════
const FL={
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Korea Republic':'🇰🇷','Czechia':'🇨🇿','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼','Curacao':'🇨🇼',"Côte d'Ivoire":'🇨🇮','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','IR Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Cabo Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Congo DR':'🇨🇩','Colombia':'🇨🇴','Uzbekistan':'🇺🇿',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'
};
const f  = n => FL[n]||'🏳';
const fe = n => `${f(n)} ${n}`;

// FIFA 3-letter country codes — compact, recognizable labels for the live ticker.
const ABBR={
  'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Korea Republic':'KOR','Czechia':'CZE','Czech Republic':'CZE',
  'Canada':'CAN','Bosnia & Herzegovina':'BIH','Bosnia and Herzegovina':'BIH','Qatar':'QAT','Switzerland':'SUI',
  'Brazil':'BRA','Morocco':'MAR','Haiti':'HAI','Scotland':'SCO',
  'USA':'USA','United States':'USA','Paraguay':'PAR','Australia':'AUS','Türkiye':'TUR','Turkey':'TUR',
  'Germany':'GER','Curaçao':'CUW','Curacao':'CUW',"Côte d'Ivoire":'CIV','Ivory Coast':'CIV','Ecuador':'ECU',
  'Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN',
  'Belgium':'BEL','Egypt':'EGY','Iran':'IRN','IR Iran':'IRN','New Zealand':'NZL',
  'Spain':'ESP','Cape Verde':'CPV','Cabo Verde':'CPV','Saudi Arabia':'KSA','Uruguay':'URU',
  'France':'FRA','Senegal':'SEN','Iraq':'IRQ','Norway':'NOR',

  'England':'ENG','Croatia':'CRO','Ghana':'GHA','Panama':'PAN'
};
const ab = n => ABBR[n] || ABBR[canon(n)] || (n||'').slice(0,3).toUpperCase();

function canon(n){
  const MAP={
    'Czech Republic':'Czechia','Turkey':'Türkiye','Cabo Verde':'Cape Verde',
    "Côte d'Ivoire":'Ivory Coast','Congo DR':'DR Congo','Curacao':'Curaçao',
    'IR Iran':'Iran','Bosnia and Herzegovina':'Bosnia & Herzegovina',
    'United States':'USA', 'Korea Republic':'South Korea'
  };
  return MAP[n]||n;
}

const GROUPS={
  A:['Mexico','South Korea','Czechia','South Africa'],
  B:['Canada','Bosnia & Herzegovina','Switzerland','Qatar'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['USA','Paraguay','Australia','Türkiye'],
  E:['Germany','Curaçao','Ivory Coast','Ecuador'],

  G:['Belgium','Egypt','Iran','New Zealand'],
  H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','DR Congo','Colombia','Uzbekistan'],

};

function getGroup(teamName) {
  const cName = canon(teamName);
  for (const [grp, teams] of Object.entries(GROUPS)) {
    if (teams.includes(cName)) return grp;
  }
  return '?';
}

// ══════════════════════════════════════════════════════════
// TIME HELPERS 
// ══════════════════════════════════════════════════════════
const DXB='Asia/Dubai';
const now=()=>new Date();
const fmtT=d=>d.toLocaleTimeString('en',{timeZone:DXB,hour:'2-digit',minute:'2-digit',hour12:false});
const fmtD=d=>d.toLocaleDateString('en',{timeZone:DXB,weekday:'short',month:'short',day:'numeric'});

function toDt(utc){ return new Date(utc); }
function isToday(d){ return d.toLocaleDateString('en',{timeZone:DXB})===now().toLocaleDateString('en',{timeZone:DXB}); }
function isLiveNow(status, dt){ 
    if(["1H", "2H", "HT", "ET", "P", "BT", "LIVE"].includes(status)) return true;
    const n = now();
    const e = new Date(dt.getTime() + 115*60000); 
    return (n > dt && n < e) && status !== "FT" && status !== "CANCELED";
}

// ══════════════════════════════════════════════════════════
// STANDINGS CALCULATOR
// ══════════════════════════════════════════════════════════
function calcStandings(matches){
  const st={};
  for(const [g,teams] of Object.entries(GROUPS)){
    st[g]={};
    teams.forEach(t=>st[g][t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  }
  matches.forEach(m=>{
    if(!m.s || m.isKO) return; 
    const {t1,t2,s:[g1,g2],g}=m;
    if(!st[g]) return;
    const add=(t,gf,ga,w,d,l)=>{
      const cName = canon(t);
      if(!st[g][cName]) st[g][cName]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const s=st[g][cName];
      s.p++;s.gf+=gf;s.ga+=ga;s.w+=w;s.d+=d;s.l+=l;s.pts+=w?3:d?1:0;
    };
    if(g1>g2)     {add(t1,g1,g2,1,0,0);add(t2,g2,g1,0,0,1);}
    else if(g1<g2){add(t1,g1,g2,0,0,1);add(t2,g2,g1,1,0,0);}
    else          {add(t1,g1,g2,0,1,0);add(t2,g2,g1,0,1,0);}
  });
  const out={};
  for(const [g,teams] of Object.entries(st)){
    out[g]=Object.entries(teams)
      .sort(([,a],[,b])=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf)
      .map(([name,s])=>({name,...s,gd:s.gf-s.ga}));
  }
  return out;
}

function renderTicker(){
  const ticker = document.getElementById('liveTicker');
  const liveM = MATCHES.filter(m => {
    const done = m.status === "FT" || m.status === "AET" || m.status === "PEN" || m.status === "CANCELED";
    return !done && isLiveNow(m.status, m.dt);
  });

  if(liveM.length > 0){
    // Each live match is a self-contained pill (flag + 3-letter code + score),
    // so concurrent matches read as separate cards instead of one stacked blur.
    let h = '';
    liveM.forEach((m) => {
      const s = m.s ? `${m.s[0]}–${m.s[1]}` : `0–0`;
      h += `<div class="ticker-match" title="${canon(m.t1)} vs ${canon(m.t2)}">
              <span class="ticker-dot">●</span>
              <span class="ticker-flag">${f(m.t1)}</span><span class="ticker-code">${ab(m.t1)}</span>
              <span class="ticker-score">${s}</span>
              <span class="ticker-code">${ab(m.t2)}</span><span class="ticker-flag">${f(m.t2)}</span>
            </div>`;
    });
    ticker.innerHTML = h;
    ticker.classList.add('active');
  } else {
    ticker.innerHTML = '';
    ticker.classList.remove('active');
  }
}

let KO_EDGES = [];   // [childCardId, parentCardId, advanced?] pairs for connector lines

function renderKO() {
  const ko = MATCHES.filter(m => m.isKO && !m.isThird);
  const r32 = ko.filter(m => m.stageLevel === 1);
  const r16 = ko.filter(m => m.stageLevel === 2);
  const qf  = ko.filter(m => m.stageLevel === 3);
  const sf  = ko.filter(m => m.stageLevel === 4);
  const fin = ko.filter(m => m.stageLevel === 5);
  const prevOf = { 5: sf, 4: qf, 3: r16, 2: r32 };

  // Winner of a completed match (handles penalties).
  const winnerOf = (m) => {
    if (!m || !m.s || !["FT","AET","PEN"].includes(m.status)) return null;
    const [s1, s2] = m.s, [p1, p2] = m.p || [0, 0];
    if (s1 > s2 || (s1 === s2 && p1 > p2)) return m.t1;
    if (s2 > s1 || (s1 === s2 && p2 > p1)) return m.t2;
    return null;
  };

  // Resolve which previous-round match feeds a given slot. ESPN slots are
  // either a numbered reference ("Round of 32 5 Winner" → match #5) or, once
  // played, the actual qualified team — which we trace back to the match it won.
  const parentFor = (slotRaw, prev) => {
    const num = (String(slotRaw).match(/(\d+)\s*Winner/i) || [])[1];
    if (num) return prev[(+num) - 1] || null;
    const team = canon(slotRaw);
    return prev.find(pm => { const w = winnerOf(pm); return w && canon(w) === team; }) || null;
  };

  // Build the bracket tree from the Final down to the Round of 32 so columns
  // can be ordered to match the real feeders (no crossed lines).
  const buildNode = (m, lvl) => {
    if (!m || lvl === 1) return { m, lvl, kids: [] };
    const prev = prevOf[lvl];
    return { m, lvl, kids: [buildNode(parentFor(m.rawT1, prev), lvl - 1),
                            buildNode(parentFor(m.rawT2, prev), lvl - 1)] };
  };
  const root = fin[0] ? buildNode(fin[0], 5) : { m: null, lvl: 5, kids: [] };

  // Assign a stable DOM id to every card and record parent→child edges.
  let idc = 0;
  KO_EDGES = [];
  const tag = (node) => {
    if (!node) return;
    if (node.m) node.id = 'koc' + (idc++);
    node.kids.forEach(k => {
      tag(k);
      if (node.m && k && k.m) KO_EDGES.push([k.id, node.id, winnerOf(k.m) ? 1 : 0]);
    });
  };
  tag(root);

  // Third-place play-off: the two semifinal LOSERS drop down into it. Reuse the
  // semifinal cards (root.kids) as its feeders, drawn as "loser" connectors.
  const third = MATCHES.find(m => m.isThird) || null;
  let thirdNode = null;
  if (third) {
    thirdNode = { m: third, id: 'koc' + (idc++) };
    [root.kids[0], root.kids[1]].forEach(sfNode => {
      if (sfNode && sfNode.m) KO_EDGES.push([sfNode.id, thirdNode.id, 0, 'loser']);
    });
  }

  // Depth-first collect (kids[0] before kids[1]) → vertical order per level.
  const collect = (node, acc) => {
    if (!node) return;
    (acc[node.lvl] = acc[node.lvl] || []).push(node);
    node.kids.forEach(k => collect(k, acc));
  };
  const left = {}, right = {};
  if (root.kids[0]) collect(root.kids[0], left);
  if (root.kids[1]) collect(root.kids[1], right);

  const makeCard = (node) => {
    const m = node && node.m;
    const id = node && node.id ? ` id="${node.id}"` : '';
    if (!m || (m.t1 === "TBD" && m.t2 === "TBD" && !m.s)) {
      return `<div class="b-match placeholder"${id}>
                <div class="b-meta">${m && m.dt ? fmtD(m.dt) : 'TBD'}</div>
                <div class="b-team tbd"><span>TBD</span><span class="b-score">-</span></div>
                <div class="b-team tbd"><span>TBD</span><span class="b-score">-</span></div>
              </div>`;
    }
    const done = m.status === "FT" || m.status === "AET" || m.status === "PEN";
    const live = !done && m.status !== "NS" && isLiveNow(m.status, m.dt);

    const s1 = m.s ? m.s[0] : (live ? 0 : '');
    const s2 = m.s ? m.s[1] : (live ? 0 : '');
    const p1 = m.p ? `<span class="b-pen">(${m.p[0]})</span>` : '';
    const p2 = m.p ? `<span class="b-pen">(${m.p[1]})</span>` : '';

    let w1 = false, w2 = false;
    if (done && m.s) {
       if (m.s[0] > m.s[1] || (m.s[0] === m.s[1] && m.p && m.p[0] > m.p[1])) w1 = true;
       if (m.s[1] > m.s[0] || (m.s[0] === m.s[1] && m.p && m.p[1] > m.p[0])) w2 = true;
    }

    const n1 = m.t1 === "TBD" ? "TBD" : `${f(m.t1)} ${canon(m.t1)}`;
    const n2 = m.t2 === "TBD" ? "TBD" : `${f(m.t2)} ${canon(m.t2)}`;

    let dtStr = "TBD";
    if (m.dt) dtStr = live ? '<span style="color:var(--live)">🔴 LIVE</span>' : fmtD(m.dt);

    return `<div class="b-match ${live ? 'live' : ''} ${done ? 'done' : ''}"${id}>
              <div class="b-meta">${dtStr}</div>
              <div class="b-team ${w1 ? 'winner' : ''} ${m.t1==='TBD'?'tbd':''}">
                <span>${n1}</span><span class="b-score">${s1}${p1}</span>
              </div>
              <div class="b-team ${w2 ? 'winner' : ''} ${m.t2==='TBD'?'tbd':''}">
                <span>${n2}</span><span class="b-score">${s2}${p2}</span>
              </div>
            </div>`;
  };

  const makeCol = (nodes, title) => {
    let h = `<div class="bracket-col"><div class="b-title">${title}</div><div class="b-slots">`;
    (nodes || []).forEach(n => { h += makeCard(n); });
    h += `</div></div>`;
    return h;
  };

  let html = `<div class="note">🕐 Dubai Time · Lines trace each winner into its next match</div>`;
  html += `<div class="ko-controls">
             <button class="ko-zbtn" onclick="koZoom(-1)" aria-label="Zoom out">−</button>
             <span id="koZoomLbl">100%</span>
             <button class="ko-zbtn" onclick="koZoom(1)" aria-label="Zoom in">+</button>
             <button class="ko-zbtn ko-fit" onclick="koFit()">⤢ Fit</button>
           </div>`;
  html += `<div class="converging-bracket" id="bracketContainer">`;
  html += `<svg class="ko-svg" id="koSvg"></svg>`;

  html += makeCol(left[1], "ROUND OF 32");
  html += makeCol(left[2], "ROUND OF 16");
  html += makeCol(left[3], "QUARTERFINALS");
  html += makeCol(left[4], "SEMIFINALS");

  html += `<div class="bracket-col b-center">
             <div class="b-title" style="font-size:24px;">🏆 FINAL</div>
             <div class="b-slots">
               <div class="b-center-inner">
                 <img src="trophy.png" style="height:120px; margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(244,196,48,0.3));">
                 ${makeCard(root)}
                 ${thirdNode ? `<div class="third-wrap">
                     <div class="third-lbl">🥉 Third-Place Play-off</div>
                     ${makeCard(thirdNode)}
                   </div>` : ''}
               </div>
             </div>
           </div>`;

  html += makeCol(right[4], "SEMIFINALS");
  html += makeCol(right[3], "QUARTERFINALS");
  html += makeCol(right[2], "ROUND OF 16");
  html += makeCol(right[1], "ROUND OF 32");

  html += `</div>`;
  document.getElementById('panel-ko').innerHTML = html;
  requestAnimationFrame(() => { drawKOConnectors(); koAutoFit(); });
}

// ── Knockout bracket zoom ──────────────────────────────────
// Uses CSS `zoom` (reflows + adjusts scroll, unlike transform). Desktop fits
// the whole bracket on open; the user can then zoom freely. Mobile keeps a
// readable natural scale (a full 9-column bracket on a phone is illegible).
let KO_ZOOM = 1;
let KO_FIT = true;                                   // true = follow auto-fit
const koIsDesktop = () => window.innerWidth >= 768;

function applyKoZoom() {
  const cont = document.getElementById('bracketContainer');
  if (cont) cont.style.zoom = KO_ZOOM;
  const lbl = document.getElementById('koZoomLbl');
  if (lbl) lbl.textContent = Math.round(KO_ZOOM * 100) + '%';
}

function koFit() {
  const panel = document.getElementById('panel-ko');
  const cont = document.getElementById('bracketContainer');
  if (!panel || !cont || !panel.classList.contains('on')) return;
  cont.style.zoom = 1;                                // measure at natural scale
  const avail = cont.clientWidth, natural = cont.scrollWidth;
  KO_ZOOM = natural > avail ? Math.max(0.25, +(avail / natural).toFixed(3)) : 1;
  KO_FIT = true;
  applyKoZoom();
}

function koZoom(dir) {
  KO_FIT = false;                                     // manual zoom overrides fit
  const step = dir > 0 ? 1.15 : 1 / 1.15;
  KO_ZOOM = Math.min(1.6, Math.max(0.25, +(KO_ZOOM * step).toFixed(3)));
  applyKoZoom();
}

// Run after a (re)render or when the KO tab opens: fit on desktop, else restore.
function koAutoFit() {
  const panel = document.getElementById('panel-ko');
  if (!panel || !panel.classList.contains('on')) return;
  if (koIsDesktop() && KO_FIT) koFit();
  else applyKoZoom();
}

// Draw SVG connector lines between each match and the next-round match it feeds.
// Must run while the Knockout panel is visible (hidden elements have no layout).
function drawKOConnectors() {
  const panel = document.getElementById('panel-ko');
  const cont = document.getElementById('bracketContainer');
  const svg = document.getElementById('koSvg');
  if (!panel || !panel.classList.contains('on') || !cont || !svg) return;

  // Measure at natural scale (zoom 1) so coordinates are zoom-independent; the
  // svg and columns then scale together uniformly when zoom is reapplied.
  cont.style.zoom = 1;

  const w = cont.scrollWidth, h = cont.scrollHeight;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = '';

  const cr = cont.getBoundingClientRect();
  const pt = (el, side) => {
    const r = el.getBoundingClientRect();
    const x = side === 'right' ? r.right : r.left;
    return { x: x - cr.left + cont.scrollLeft, y: (r.top + r.bottom) / 2 - cr.top + cont.scrollTop };
  };

  KO_EDGES.forEach(([childId, parentId, advanced, kind]) => {
    const c = document.getElementById(childId), p = document.getElementById(parentId);
    if (!c || !p) return;
    const cRect = c.getBoundingClientRect(), pRect = p.getBoundingClientRect();
    const childLeftOfParent = cRect.left < pRect.left;
    const s = childLeftOfParent ? pt(c, 'right') : pt(c, 'left');
    const e = childLeftOfParent ? pt(p, 'left')  : pt(p, 'right');
    const dir = e.x > s.x ? 1 : -1;
    const cc = Math.max(18, Math.abs(e.x - s.x) * 0.5);
    const d = `M ${s.x} ${s.y} C ${s.x + dir * cc} ${s.y}, ${e.x - dir * cc} ${e.y}, ${e.x} ${e.y}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', kind === 'loser' ? 'ko-line loser' : advanced ? 'ko-line adv' : 'ko-line');
    svg.appendChild(path);
  });

  applyKoZoom();   // restore the user's / fitted zoom level
}

// ══════════════════════════════════════════════════════════
// HORIZONTAL CALENDAR STRIP LOGIC
// ══════════════════════════════════════════════════════════
// The active schedule filter, remembered across the 60s auto-refresh so the
// view doesn't snap back. 'TODAY' is the default sentinel (resolves to the
// current date); otherwise it's a concrete date string or 'ALL'.
let CURRENT_FILTER = 'TODAY';

function setupDateFilter() {
  const strip = document.getElementById("calStrip");
  if (!strip) return;

  const uniqueDates = [...new Set(MATCHES.map(m => fmtD(m.dt)))];
  const todayStr = fmtD(now());

  let html = '';
  uniqueDates.forEach((dateStr) => {
    const parts = dateStr.replace(',', '').split(' ');

    if(parts.length === 3) {
      const isTodayChip = dateStr === todayStr;
      html += `<div class="dc${isTodayChip ? ' today' : ''}" data-date="${dateStr}" onclick="filterDays('${dateStr}')">
                  <span class="dc-dow">${parts[0]} ${parts[1]}</span>
                  <span class="dc-day">${parts[2]}</span>
                  ${isTodayChip ? '<span class="dc-now">TODAY</span>' : ''}
               </div>`;
    }
  });

  // Floating "All days" button — pinned to the right of the strip (sticky), so
  // it stays reachable while the day chips scroll underneath it.
  html += `<button class="cal-all" id="calAllBtn" onclick="filterDays('ALL')">Full<br>Schedule</button>`;

  strip.innerHTML = html;
  applyFilter();
  scrollCalToToday();
}

// Resolve the stored filter into a concrete value: the today sentinel becomes
// today's date if it has fixtures, otherwise we fall back to showing everything.
function resolveFilter() {
  if (CURRENT_FILTER === 'ALL') return 'ALL';
  if (CURRENT_FILTER === 'TODAY') {
    const t = fmtD(now());
    return [...new Set(MATCHES.map(m => fmtD(m.dt)))].includes(t) ? t : 'ALL';
  }
  return CURRENT_FILTER;
}

// Apply the current filter to chips + rows. Safe to call after every rebuild.
function applyFilter() {
  const val = resolveFilter();
  document.querySelectorAll('#calStrip .dc').forEach(el =>
    el.classList.toggle('active', el.getAttribute('data-date') === val));
  const allBtn = document.getElementById('calAllBtn');
  if (allBtn) allBtn.classList.toggle('active', val === 'ALL');
  document.querySelectorAll('#sched-content tbody tr').forEach(row => {
    row.style.display = (val === 'ALL' || row.getAttribute('data-date') === val) ? '' : 'none';
  });
}

function filterDays(filterVal) {
  CURRENT_FILTER = filterVal;
  applyFilter();
}

// Center the calendar strip on today's chip so the user lands on the current
// day without scrolling. Runs whenever the strip is (re)built or the Schedule
// tab is opened (offsetLeft is 0 while the panel is hidden, so we re-run there).
function scrollCalToToday() {
  const strip = document.getElementById('calStrip');
  if (!strip) return;
  const el = strip.querySelector('.dc.today');
  if (!el || !el.offsetWidth) return;
  const target = el.offsetLeft - (strip.clientWidth / 2) + (el.offsetWidth / 2);
  strip.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
}

function renderAll(){
  if(MATCHES.length === 0) {
    const emptyHtml = `
      <div style="text-align:center; padding: 60px 20px; border: 1px solid var(--bdr); border-radius: 10px; background: var(--s1); margin-top: 10px;">
        <span style="font-size: 32px; display: block; margin-bottom: 10px;">📡</span>
        <h3 style="font-family: 'Bebas Neue'; font-size: 20px; color: var(--gold); letter-spacing: 1px;">Awaiting Fixture Data</h3>
        <p style="color: var(--gr); font-size: 12px; margin-top: 5px;">Your automation pipeline is connected and working, but no matches are currently active.</p>
      </div>`;
    document.getElementById('panel-today').innerHTML = emptyHtml;
    document.getElementById('panel-groups').innerHTML = emptyHtml;
    document.getElementById('panel-sched').innerHTML = emptyHtml;
    document.getElementById('liveTicker').style.display = 'none';
    renderKO();
    return;
  }
  
  renderTicker();
  renderToday();
  renderGroups();
  renderSchedule();
  setupDateFilter(); 
  renderKO();
}

// ══════════════════════════════════════════════════════════
// LOAD DATA 
// ══════════════════════════════════════════════════════════
async function loadData(){
  const btn=document.getElementById('rfBtn');
  const ico=document.getElementById('rfIco');
  const txt=document.getElementById('sbarTxt');

  btn.disabled=true;
  ico.outerHTML=`<div class="btn-spin" id="rfIco"></div>`;
  txt.innerHTML='Fetching backend data…';

  try{
    const res = await fetch(LOCAL_LIVE_URL+'?v='+Date.now());
    if(!res.ok) throw new Error('Data not ready yet');
    
    const fetchedData = await res.json();

    // A "real" team belongs to a group. Placeholder slots (e.g. "Round of 32 5
    // Winner", "Semifinal 1 Loser") or empty names are NOT real teams. ESPN
    // leaves the round/"stage" field blank, so we must not rely on it.
    const isPlaceholder = s => !s || /winner|loser|round of|quarter|semi|final|\btbd\b|place/i.test(s);

    MATCHES = fetchedData.map(m => {
        const d = toDt(m.utc);
        const ph1 = isPlaceholder(m.t1);
        const ph2 = isPlaceholder(m.t2);
        const g1 = ph1 ? '?' : getGroup(m.t1);
        const g2 = ph2 ? '?' : getGroup(m.t2);

        // A group match is two real teams from the SAME group. Anything else
        // (a cross-group pairing or a placeholder slot) is a knockout match.
        const isGroupMatch = !ph1 && !ph2 && g1 !== '?' && g1 === g2;

        return {
            ...m,
            p: m.p || null,
            dt: d,
            t1: ph1 ? 'TBD' : m.t1,
            t2: ph2 ? 'TBD' : m.t2,
            rawT1: m.t1,
            rawT2: m.t2,
            g: isGroupMatch ? g1 : '?',
            isKO: !isGroupMatch,
            isThird: /loser/i.test(`${m.t1} ${m.t2}`),
            stageLevel: 0,
            stageLabel: ''
        };
    }).sort((a,b) => a.dt - b.dt);

    // The 2026 knockout schedule is fixed: 16 Round-of-32, 8 Round-of-16,
    // 4 Quarterfinals, 2 Semifinals, then the Final (the third-place match is
    // handled separately). Sorted chronologically, the bracket matches fall in
    // exactly that order, so we assign the round by position. This is immune to
    // ESPN leaving the "stage" field blank (the original all-TBD bug).
    const STAGE_LABELS = {1:'Round of 32',2:'Round of 16',3:'Quarterfinal',4:'Semifinal',5:'Final'};
    MATCHES.filter(m => m.isKO && !m.isThird).forEach((m,i) => {
        m.stageLevel = i < 16 ? 1 : i < 24 ? 2 : i < 28 ? 3 : i < 30 ? 4 : 5;
        m.stageLabel = STAGE_LABELS[m.stageLevel];
    });
    MATCHES.filter(m => m.isThird).forEach(m => { m.stageLevel = 0; m.stageLabel = 'Third Place'; });

    STANDINGS=calcStandings(MATCHES);
    renderAll();
    
    const played=MATCHES.filter(m=>m.s).length;
    const t=fmtT(new Date());
    txt.innerHTML=`<b>✅ Data Synced</b> · ${played} matches played · ${t} DXB`;
    txt.className='sbar-txt';
  }catch(e){
    txt.innerHTML=`<b>⚠ Waiting for backend robot to run...</b>`;
    txt.className='sbar-txt err';
  }

  btn.disabled=false;
  document.getElementById('rfIco').outerHTML=`<span id="rfIco">↻</span>`;
}

// ══════════════════════════════════════════════════════════
// NAV + CLOCK + CALENDAR
// ══════════════════════════════════════════════════════════
function go(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  el.classList.add('on');
  if(name==='ko') requestAnimationFrame(() => { drawKOConnectors(); koAutoFit(); });
  if(name==='sched') requestAnimationFrame(scrollCalToToday);
}

let koResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(koResizeTimer);
  koResizeTimer = setTimeout(() => { drawKOConnectors(); koAutoFit(); }, 120);
});

let lastDay = "";

function tick(){
  const dxbNow = new Date();
  
  const el = document.getElementById('clk');
  if(el) el.textContent = dxbNow.toLocaleTimeString('en', {timeZone:DXB, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}) + ' DXB';
  
  const currentDay = dxbNow.toLocaleDateString('en', { timeZone: DXB, day: '2-digit' });
  
  if(currentDay !== lastDay) {
    const currentMonth = dxbNow.toLocaleDateString('en', { timeZone: DXB, month: 'short' });
    const tab = document.getElementById('todayTab');
    if(tab) {
      tab.innerHTML = `<span class="cal-icon"><b>${currentMonth}</b><i>${currentDay}</i></span> Today`;
    }
    lastDay = currentDay;
  }
}

// Boot
setInterval(tick, 1000); 
tick();
loadData();
setInterval(() => loadData(), 60000); 
</script>
