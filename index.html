<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">


  
  <style>

   /* Mobile adjustments for the signature */
@media (max-width: 600px) {
  .signature {
    text-align: right;    /* Keeps the stacked text aligned to the right edge */
    line-height: 1.2;     /* Keeps the two lines close together */
    z-index: 100;         /* Forces it to sit on top of other elements */
  }
}
:root{
  --bg:#08090e;--s1:#10131c;--s2:#161a26;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --gold:#f4c430;--gold2:#ffd84d;--gbg:rgba(244,196,48,.09);--gbdr:rgba(244,196,48,.26);
  --w:#edf0f8;--gr:#8892ad;--dim:#4a5268;
  --green:#2ed172;--grbg:rgba(46,209,114,.1);
  --red:#ff5050;--rdbg:rgba(255,80,80,.1);
  --blue:#5598f4;--blbg:rgba(85,152,244,.1);
  --live:#ff3030;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
.hdr{background:linear-gradient(180deg,#0d1020 0%,var(--bg) 100%);border-bottom:1px solid var(--bdr2);padding:20px 16px 14px;text-align:center;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.hdr-icon {
  display: block;
  margin: 0 auto 8px;
  height: 60px; /* You can change this number to make the cup bigger or smaller */
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(244,196,48,0.4)); /* Adds a slight golden glow to match your title */
}
.hdr h1{font-family:'Bebas Neue';font-size:clamp(24px,6vw,48px);letter-spacing:4px;color:var(--gold);text-shadow:0 0 32px rgba(244,196,48,.3);line-height:1;}
.hdr-sub{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gr);text-transform:uppercase;margin-top:3px;}
.hdr-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:10px;}
.pill{background:rgba(255,255,255,.05);border:1px solid var(--bdr2);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600;color:var(--gr);}
.pill.g{background:var(--gbg);border-color:var(--gbdr);color:var(--gold);}

/* SBAR & TICKER */
.sbar{background:#0b0d17;border-bottom:1px solid var(--bdr);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:44px;}
.rfbtn{display:flex;align-items:center;gap:6px;background:var(--green);border:none;border-radius:7px;padding:6px 14px;font-family:'Inter';font-size:11px;font-weight:700;color:#000;cursor:pointer;text-transform:uppercase;letter-spacing:.6px;transition:filter .2s;}
.rfbtn:hover{filter:brightness(1.1);}
.rfbtn:disabled{opacity:.45;cursor:not-allowed;}
.btn-spin{width:11px;height:11px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sbar-txt{font-size:11px;color:var(--dim);}
.sbar-txt b{color:var(--green);}
.sbar-txt.err b{color:var(--red);}

/* GLOBAL LIVE TICKER */
.live-ticker {
  display: none;
  margin: 0 auto;
  background: var(--rdbg);
  border: 1px solid rgba(255,48,48,.2);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--w);
  align-items: center;
  gap: 12px;
}
.live-ticker.active {
  display: flex;
}
.ticker-match {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ticker-dot {
  color: var(--live);
  font-size: 10px;
  animation: blink 1.2s ease-in-out infinite;
}
.ticker-score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--gold2);
  font-size: 14px;
}
.ticker-div {
  color: rgba(255,255,255,0.1);
  font-size: 14px;
}

.sbar-r{margin-left:auto;display:flex;align-items:center;gap:14px;}
.lnk{font-size:11px;font-weight:600;text-decoration:none;}
.lnk.live-lnk{color:var(--live);}
.lnk.live-lnk::before{content:'● ';animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.clk{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);}

.tabs{display:flex;overflow-x:auto;scrollbar-width:none;background:#0b0d17;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:30;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter';text-transform:uppercase;}
.tab:hover{color:var(--gr);}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.panel{display:none;padding:12px 14px;}
.panel.on{display:block;}
.note{background:var(--blbg);border:1px solid rgba(85,152,244,.2);border-radius:7px;padding:8px 12px;margin-bottom:12px;font-size:11px;font-weight:600;color:var(--blue);}
.loader{text-align:center;padding:48px 20px;color:var(--dim);}
.big-spin{width:30px;height:30px;border:3px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
.today-hd{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;}
.mc{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.mc.eg{background:var(--gbg);border-color:var(--gbdr);}
.mc.live{border-color:rgba(255,48,48,.35);background:rgba(255,48,48,.04);}
.mc.done{opacity:.72;}
.mc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mc-time{font-family:'JetBrains Mono';font-size:14px;font-weight:600;color:var(--gold);min-width:50px;flex-shrink:0;}
.mc-time.t-done{color:var(--green);}
.mc-time.t-live{color:var(--live);}
.mc-teams{flex:1;font-size:14px;font-weight:700;color:var(--w);}
.mc-score{font-family:'Bebas Neue';font-size:22px;color:var(--gold2);letter-spacing:2px;}
.mc-foot{display:flex;gap:7px;align-items:center;margin-top:4px;flex-wrap:wrap;font-size:11px;color:var(--dim);}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.t-g{background:var(--blbg);color:var(--blue);}
.t-ok{background:var(--grbg);color:var(--green);}
.t-lv{background:var(--rdbg);color:var(--live);}
.t-nx{background:rgba(255,255,255,.04);color:var(--dim);}
.ibox{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px;margin-top:8px;}
.ibox.gold{background:var(--gbg);border-color:var(--gbdr);}
.ilbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.ilbl.g{color:var(--gold);}
.irow{font-size:12px;color:var(--gr);line-height:2.1;}
.irow strong{color:var(--w);}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:10px;}
.gc{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.gc.eg{border-color:var(--gbdr);box-shadow:0 0 18px rgba(244,196,48,.06);}
.gc-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s2);border-bottom:1px solid var(--bdr);}
.gc-lbl{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--w);}
.gc.eg .gc-lbl{color:var(--gold);}
.eg-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--gbg);border:1px solid var(--gbdr);color:var(--gold);text-transform:uppercase;letter-spacing:.8px;}
table.st{width:100%;border-collapse:collapse;}
table.st th{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;padding:5px 10px;text-align:center;border-bottom:1px solid var(--bdr);}
table.st th:first-child{text-align:left;}
table.st td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-size:12px;color:var(--gr);}
table.st td:first-child{text-align:left;font-weight:600;color:var(--w);}
table.st tr:last-child td{border-bottom:none;}
table.st tr.egr td{color:var(--gold);}
.pts{font-family:'JetBrains Mono';font-weight:700;color:var(--w)!important;}
table.st tr.egr .pts{color:var(--gold)!important;}
.q1{border-left:3px solid var(--green);}
.q3{border-left:3px solid var(--gold);}
.el{border-left:3px solid transparent;}
.gc-ms{border-top:1px solid var(--bdr);}
.mi{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.mi:last-child{border-bottom:none;}
.mi.egm{background:rgba(244,196,48,.05);border-left:2px solid var(--gold);}
.mi-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mi-t{font-size:12px;font-weight:600;color:var(--w);}
.mi-s{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--gold2);}
.mi-bot{font-size:10px;color:var(--dim);margin-top:2px;}
.mi-dxb{color:var(--gold);font-weight:700;}
.sb{margin-bottom:22px;}
.sb-ttl{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--w);padding:8px 0 6px;border-bottom:1px solid var(--bdr);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.sp{font-size:9px;font-family:'Inter';font-weight:700;letter-spacing:1.2px;padding:2px 8px;border-radius:4px;text-transform:uppercase;}
.sp-g{background:var(--blbg);color:var(--blue);}
.sp-k{background:var(--rdbg);color:var(--red);}
.sp-f{background:var(--gbg);color:var(--gold);}
.sw{overflow-x:auto;}
table.ft{width:100%;border-collapse:collapse;min-width:420px;}
table.ft thead th{text-align:left;padding:6px 10px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);background:var(--s2);border-bottom:1px solid var(--bdr2);}
table.ft tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
table.ft tbody tr:hover td{background:rgba(255,255,255,.02);}
table.ft tbody tr.dr td{color:var(--dim);}
table.ft tbody tr.er td{background:rgba(244,196,48,.06);}
table.ft tbody tr.lr td{background:rgba(255,48,48,.04);}
table.ft tbody tr.fr td{background:var(--gbg)!important;}
.tn{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);}
.tdt{font-size:11px;color:var(--gr);white-space:nowrap;}
.ttime{font-family:'JetBrains Mono';font-size:12px;font-weight:700;color:var(--gold);}
.tm2{font-weight:600;color:var(--w);font-size:13px;}
.tsc{font-family:'JetBrains Mono';font-weight:700;color:var(--gold2);font-size:12px;white-space:nowrap;}
.tv{font-size:11px;color:var(--dim);}
.gt{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--blbg);color:var(--blue);}
.fmt-box{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:14px;}
.fmt-box h3{font-family:'Bebas Neue';font-size:14px;letter-spacing:1.5px;color:var(--gold);margin-bottom:5px;}
.fmt-box p{font-size:12px;color:var(--gr);line-height:1.7;}
.legend{display:flex;flex-wrap:wrap;gap:12px;padding:10px 0;font-size:11px;color:var(--dim);}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:8px;height:8px;border-radius:1px;}

/* SIGNATURE */
.signature {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.5px;
}
.signature span {
  color: var(--gold);
  font-weight: 600;
}

/* DYNAMIC CALENDAR ICON */
.cal-icon {
  display: inline-block;
  border: 1px solid var(--bdr);
  border-radius: 4px;
  text-align: center;
  line-height: 1;
  overflow: hidden;
  margin-right: 6px;
  vertical-align: middle;
  background: var(--s1);
  transform: translateY(-1px);
}
.cal-icon b {
  display: block;
  background: var(--red);
  color: #fff;
  font-size: 7px;
  padding: 2px 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cal-icon i {
  display: block;
  font-size: 9px;
  font-weight: 700;
  color: var(--w);
  padding: 2px 4px 1px;
  font-style: normal;
}

@media(max-width:768px){
  .live-ticker { width: 100%; order: 3; justify-content: center; }
}
@media(max-width:560px){.tv{display:none;}.gg{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="hdr">
<img class="hdr-icon" src="trophy.png" alt="World Cup Trophy">
  <h1>FIFA World Cup 2026</h1>
  <div class="hdr-sub">Canada · Mexico · United States</div>
  <div class="hdr-pills">
    <span class="pill">Jun 11 – Jul 19, 2026</span>
    <span class="pill">48 Teams · 104 Matches</span>
    <span class="pill g">🕐 Dubai Time (UTC+4)</span>
  </div>
<div class="signature">Designed by:<br>Eng. Mickey ;) </div>
</div>

<div class="sbar">
  <button class="rfbtn" id="rfBtn" onclick="loadData(true)">
    <span id="rfIco">↻</span> Refresh
  </button>

  <div id="liveTicker" class="live-ticker"></div>

  <div class="sbar-r">
    <span class="clk" id="clk"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab on" id="todayTab" onclick="go('today',this)">Today</button>
  <button class="tab"     onclick="go('groups',this)">🏟 Groups</button>
  <button class="tab"     onclick="go('sched',this)">📋 Schedule</button>
  <button class="tab"     onclick="go('ko',this)">⚡ Knockout</button>
</div>

<div id="panel-today"  class="panel on"><div class="loader"><div class="big-spin"></div>Loading…</div></div>
<div id="panel-groups" class="panel"><div class="loader"><div class="big-spin"></div>Loading…</div></div>
<div id="panel-sched"  class="panel"><div class="loader"><div class="big-spin"></div>Loading…</div></div>
<div id="panel-ko"     class="panel"></div>

<script>
// ══════════════════════════════════════════════════════════
// DATA SOURCE (Your Automated Robot Output)
// ══════════════════════════════════════════════════════════
const LOCAL_LIVE_URL = 'https://raw.githubusercontent.com/engmickey-lang/Fifa-WC-2026/main/live_scores.json';
// ══════════════════════════════════════════════════════════
// FLAGS & CONSTANTS
// ══════════════════════════════════════════════════════════
const FL={
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Korea Republic':'🇰🇷','Czechia':'🇨🇿','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼','Curacao':'🇨🇼',"Côte d'Ivoire":'🇨🇮','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','IR Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Cabo Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Congo DR':'🇨🇩','Colombia':'🇨🇴','Uzbekistan':'🇺🇿',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'
};
const f  = n => FL[n]||'🏳';
const fe = n => `${f(n)} ${n}`;

function canon(n){
  const MAP={
    'Czech Republic':'Czechia','Turkey':'Türkiye','Cabo Verde':'Cape Verde',
    "Côte d'Ivoire":'Ivory Coast','Congo DR':'DR Congo','Curacao':'Curaçao',
    'IR Iran':'Iran','Bosnia and Herzegovina':'Bosnia & Herzegovina',
    'United States':'USA', 'Korea Republic':'South Korea'
  };
  return MAP[n]||n;
}

const GROUPS={
  A:['Mexico','South Korea','Czechia','South Africa'],
  B:['Canada','Bosnia & Herzegovina','Switzerland','Qatar'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['USA','Paraguay','Australia','Türkiye'],
  E:['Germany','Curaçao','Ivory Coast','Ecuador'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Egypt','Iran','New Zealand'],
  H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','DR Congo','Colombia','Uzbekistan'],
  L:['England','Croatia','Ghana','Panama']
};

function getGroup(teamName) {
  const cName = canon(teamName);
  for (const [grp, teams] of Object.entries(GROUPS)) {
    if (teams.includes(cName)) return grp;
  }
  return '?';
}

// ══════════════════════════════════════════════════════════
// TIME HELPERS (Locked to Dubai)
// ══════════════════════════════════════════════════════════
const DXB='Asia/Dubai';
const now=()=>new Date();
const fmtT=d=>d.toLocaleTimeString('en',{timeZone:DXB,hour:'2-digit',minute:'2-digit',hour12:false});
const fmtD=d=>d.toLocaleDateString('en',{timeZone:DXB,weekday:'short',month:'short',day:'numeric'});

function toDt(utc){ return new Date(utc); }
function isToday(d){ return d.toLocaleDateString('en',{timeZone:DXB})===now().toLocaleDateString('en',{timeZone:DXB}); }
function isLiveNow(status, dt){ 
    if(["1H", "2H", "HT", "ET", "P", "BT", "LIVE"].includes(status)) return true;
    const n = now();
    const e = new Date(dt.getTime() + 115*60000); 
    return (n > dt && n < e) && status !== "FT" && status !== "CANCELED";
}

// ══════════════════════════════════════════════════════════
// STANDINGS CALCULATOR
// ══════════════════════════════════════════════════════════
function calcStandings(matches){
  const st={};
  for(const [g,teams] of Object.entries(GROUPS)){
    st[g]={};
    teams.forEach(t=>st[g][t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  }
  matches.forEach(m=>{
    if(!m.s) return;
    const {t1,t2,s:[g1,g2],g}=m;
    if(!st[g]) return;
    const add=(t,gf,ga,w,d,l)=>{
      const cName = canon(t);
      if(!st[g][cName]) st[g][cName]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const s=st[g][cName];
      s.p++;s.gf+=gf;s.ga+=ga;s.w+=w;s.d+=d;s.l+=l;s.pts+=w?3:d?1:0;
    };
    if(g1>g2)     {add(t1,g1,g2,1,0,0);add(t2,g2,g1,0,0,1);}
    else if(g1<g2){add(t1,g1,g2,0,0,1);add(t2,g2,g1,1,0,0);}
    else          {add(t1,g1,g2,0,1,0);add(t2,g2,g1,0,1,0);}
  });
  const out={};
  for(const [g,teams] of Object.entries(st)){
    out[g]=Object.entries(teams)
      .sort(([,a],[,b])=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf)
      .map(([name,s])=>({name,...s,gd:s.gf-s.ga}));
  }
  return out;
}

// ══════════════════════════════════════════════════════════
// STATE & RENDER
// ══════════════════════════════════════════════════════════
let MATCHES=[];
let STANDINGS={};

function renderTicker(){
  const ticker = document.getElementById('liveTicker');
  const liveM = MATCHES.filter(m => {
    const done = m.status === "FT" || m.status === "AET" || m.status === "PEN" || m.status === "CANCELED";
    return !done && isLiveNow(m.status, m.dt);
  });

  if(liveM.length > 0){
    let h = '';
    liveM.forEach((m, idx) => {
      const s = m.s ? `${m.s[0]}–${m.s[1]}` : `0–0`;
      if(idx > 0) h += `<span class="ticker-div">|</span>`;
      h += `<div class="ticker-match">
              <span class="ticker-dot">●</span> 
              <span>${f(m.t1)} ${canon(m.t1)}</span>
              <span class="ticker-score">${s}</span>
              <span>${canon(m.t2)} ${f(m.t2)}</span>
            </div>`;
    });
    ticker.innerHTML = h;
    ticker.classList.add('active');
  } else {
    ticker.innerHTML = '';
    ticker.classList.remove('active');
  }
}

function renderToday(){
  const n=now();
  const todayM=MATCHES.filter(m=>isToday(m.dt)).sort((a,b)=>a.dt-b.dt);
  const recentM=MATCHES.filter(m=>m.s&&!isToday(m.dt)&&(n-m.dt)<40*3600000).sort((a,b)=>b.dt-a.dt).slice(0,6);
  const egyptNext=MATCHES.find(m=>(canon(m.t1)==='Egypt'||canon(m.t2)==='Egypt')&&!m.s&&m.dt>n);
  const upcomingM=MATCHES.filter(m=>!m.s&&!isToday(m.dt)&&m.dt>n).slice(0,5);

  const dStr=n.toLocaleDateString('en',{timeZone:DXB,weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let h=`<div class="note">🕐 Dubai Time (UTC+4 = ET+8) · ${dStr}</div>`;

  if(!todayM.length){
    h+=`<div class="today-hd">No matches scheduled today</div>`;
  } else {
    h+=`<div class="today-hd">Today's Matches</div>`;
    todayM.forEach(m=>{
      const done = m.status === "FT" || m.status === "AET" || m.status === "PEN";
      const live = !done && isLiveNow(m.status, m.dt);
      const eg = canon(m.t1)==='Egypt'||canon(m.t2)==='Egypt';
      const scoreText = m.s ? `${m.s[0]}–${m.s[1]}` : (live ? `0–0` : '');

      h+=`<div class="mc ${eg?'eg':''} ${live?'live':''} ${done?'done':''}">
        <div class="mc-row">
          <span class="mc-time ${done?'t-done':live?'t-live':''}">${live ? '🔴 LIVE' : fmtT(m.dt)}</span>
          <span class="mc-teams">${fe(m.t1)} vs ${fe(m.t2)}</span>
          ${scoreText ? `<span class="mc-score">${scoreText}</span>` : ''}
        </div>
        <div class="mc-foot">
          <span class="tag t-g">Group ${m.g}</span>
          ${done?`<span class="tag t-ok">✅ FT</span>`:!live?`<span class="tag t-nx">Upcoming</span>`:''}
          <span>${m.v}</span>
        </div>
      </div>`;
    });
  }

  if(recentM.length){
    h+=`<div class="ibox" style="margin-top:12px"><div class="ilbl">Recent Results</div><div class="irow">`;
    recentM.forEach(m=>{h+=`<span style="color:var(--green)">●</span> <strong>${fe(m.t1)} ${m.s[0]}–${m.s[1]} ${fe(m.t2)}</strong> · Group ${m.g} · ${m.v}<br>`;});
    h+=`</div></div>`;
  }
  if(egyptNext){
    h+=`<div class="ibox gold" style="margin-top:8px">
      <div class="ilbl g">🇪🇬 Egypt's Next Match</div>
      <div class="irow"><strong>${fe(egyptNext.t1)} vs ${fe(egyptNext.t2)}</strong><br>
      <span style="color:var(--gold);font-weight:700">${fmtD(egyptNext.dt)} · ${fmtT(egyptNext.dt)} Dubai</span> · ${egyptNext.v}</div>
    </div>`;
  }
  if(upcomingM.length){
    h+=`<div class="ibox" style="margin-top:8px"><div class="ilbl">Coming Up</div><div class="irow">`;
    upcomingM.forEach(m=>{h+=`<span style="color:var(--dim)">●</span> <strong>${fe(m.t1)} vs ${fe(m.t2)}</strong> · <span style="color:var(--gold)">${fmtT(m.dt)}</span> ${fmtD(m.dt)} · ${m.v}<br>`;});
    h+=`</div></div>`;
  }
  document.getElementById('panel-today').innerHTML=h;
}

function renderGroups(){
  let h=`<div class="note">🕐 Dubai Time · Standings calculated from results</div><div class="gg">`;
  for(const [g,rows] of Object.entries(STANDINGS)){
    const isEg=g==='G';
    const grpM=MATCHES.filter(m=>m.g===g).sort((a,b)=>a.dt-b.dt);
    h+=`<div class="gc ${isEg?'eg':''}">
      <div class="gc-hd"><span class="gc-lbl">Group ${g}</span>${isEg?`<span class="eg-badge">🇪🇬 Egypt</span>`:''}</div>
      <table class="st"><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const cls=i<2?'q1':i===2?'q3':'el';
      h+=`<tr class="${cls}${r.name==='Egypt'?' egr':''}">
        <td>${f(r.name)} ${r.name}</td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gd>=0?'+':''}${r.gd}</td><td class="pts">${r.pts}</td>
      </tr>`;
    });
    h+=`</tbody></table><div class="gc-ms">`;
    grpM.forEach(m=>{
      const eg = canon(m.t1)==='Egypt'||canon(m.t2)==='Egypt';
      const live = isLiveNow(m.status, m.dt) && !m.s; 
      const scoreText = m.s ? `${m.s[0]}–${m.s[1]}` : (live ? `0–0` : '');

      h+=`<div class="mi ${eg?'egm':''}">
        <div class="mi-top"><span class="mi-t">${fe(m.t1)} vs ${fe(m.t2)}</span>${scoreText?`<span class="mi-s">${scoreText}</span>`:''}</div>
        <div class="mi-bot"><span class="mi-dxb">${fmtT(m.dt)}</span> · ${fmtD(m.dt)} · ${m.v}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div><div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Top 2 — auto qualify</div>
    <div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>3rd — best 8 qualify</div>
  </div>`;
  document.getElementById('panel-groups').innerHTML=h;
}

function renderSchedule(){
  let h=`<div class="note">🕐 Dubai Time (UTC+4) · ⭐ = Egypt · Dimmed = finished</div>
  <div class="sb"><div class="sb-ttl"><span class="sp sp-g">Group Stage</span></div>
  <div class="sw"><table class="ft">
    <thead><tr><th>#</th><th>Dubai Date · Time</th><th>Match</th><th>Grp</th><th class="tv">Venue</th><th>Score</th></tr></thead><tbody>`;

  MATCHES.forEach((m,i)=>{
    const done = m.status === "FT" || m.status === "AET" || m.status === "PEN";
    const live = !done && isLiveNow(m.status, m.dt);
    const eg = canon(m.t1)==='Egypt'||canon(m.t2)==='Egypt';
    const today = isToday(m.dt);
    
    const scoreText = m.s ? `${m.s[0]}–${m.s[1]}` : (live ? `0–0` : '');

    h+=`<tr class="${done?'dr':''} ${eg?'er':''} ${live?'lr':''}">
      <td class="tn">${i+1}${eg?'⭐':''}</td>
      <td class="tdt">${fmtD(m.dt)} · <span class="ttime">${fmtT(m.dt)}</span>
        ${today?`<span style="font-size:9px;color:var(--gold);margin-left:4px;font-weight:700">TODAY</span>`:''}</td>
      <td class="tm2">${fe(m.t1)} vs ${fe(m.t2)}</td>
      <td><span class="gt">${m.g}</span></td>
      <td class="tv">${m.v}</td>
      <td class="${scoreText?'tsc':'tv'}">${scoreText ? `${scoreText}${done?' ✅':` 🔴`}`: (live ? `0–0 🔴` : '—')}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('panel-sched').innerHTML=h;
}

function renderKO(){
  document.getElementById('panel-ko').innerHTML=`
  <div class="note">🕐 Dubai Time (UTC+4 = ET+8)</div>
  <div class="fmt-box">
    <h3>Tournament Format</h3>
    <p>Top 2 from each group + 8 best 3rd-place teams = 32 advance to new <strong>Round of 32</strong>.<br>
    🏆 <strong>Final: Sun Jul 19 · 23:00 Dubai (3pm ET)</strong></p>
  </div>`;
}

function renderAll(){
  if(MATCHES.length === 0) {
    const emptyHtml = `
      <div style="text-align:center; padding: 60px 20px; border: 1px solid var(--bdr); border-radius: 10px; background: var(--s1); margin-top: 10px;">
        <span style="font-size: 32px; display: block; margin-bottom: 10px;">📡</span>
        <h3 style="font-family: 'Bebas Neue'; font-size: 20px; color: var(--gold); letter-spacing: 1px;">Awaiting Fixture Data</h3>
        <p style="color: var(--gr); font-size: 12px; margin-top: 5px;">Your automation pipeline is connected and working, but no matches are currently active.</p>
      </div>`;
    document.getElementById('panel-today').innerHTML = emptyHtml;
    document.getElementById('panel-groups').innerHTML = emptyHtml;
    document.getElementById('panel-sched').innerHTML = emptyHtml;
    document.getElementById('liveTicker').style.display = 'none';
    renderKO();
    return;
  }
  
  renderTicker();
  renderToday();
  renderGroups();
  renderSchedule();
  renderKO();
}

// ══════════════════════════════════════════════════════════
// LOAD DATA (Strictly local JSON created by Python)
// ══════════════════════════════════════════════════════════
async function loadData(){
  const btn=document.getElementById('rfBtn');
  const ico=document.getElementById('rfIco');
  const txt=document.getElementById('sbarTxt');

  btn.disabled=true;
  ico.outerHTML=`<div class="btn-spin" id="rfIco"></div>`;
  txt.innerHTML='Fetching backend data…';

  try{
    const res = await fetch(LOCAL_LIVE_URL+'?v='+Date.now());
    if(!res.ok) throw new Error('Data not ready yet');
    
    const fetchedData = await res.json();
    
    MATCHES = fetchedData.map(m => {
        return {
            ...m,
            g: getGroup(m.t1),
            dt: toDt(m.utc)
        };
    }).sort((a,b) => a.dt - b.dt);

    STANDINGS=calcStandings(MATCHES);
    renderAll();
    
    const played=MATCHES.filter(m=>m.s).length;
    const t=fmtT(new Date());
    txt.innerHTML=`<b>✅ Data Synced</b> · ${played} matches played · ${t} DXB`;
    txt.className='sbar-txt';
  }catch(e){
    txt.innerHTML=`<b>⚠ Waiting for backend robot to run...</b>`;
    txt.className='sbar-txt err';
  }

  btn.disabled=false;
  document.getElementById('rfIco').outerHTML=`<span id="rfIco">↻</span>`;
}

// ══════════════════════════════════════════════════════════
// NAV + CLOCK + CALENDAR
// ══════════════════════════════════════════════════════════
function go(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  el.classList.add('on');
}

let lastDay = "";

function tick(){
  const dxbNow = new Date();
  
  const el = document.getElementById('clk');
  if(el) el.textContent = dxbNow.toLocaleTimeString('en', {timeZone:DXB, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}) + ' DXB';
  
  const currentDay = dxbNow.toLocaleDateString('en', { timeZone: DXB, day: '2-digit' });
  
  if(currentDay !== lastDay) {
    const currentMonth = dxbNow.toLocaleDateString('en', { timeZone: DXB, month: 'short' });
    const tab = document.getElementById('todayTab');
    if(tab) {
      tab.innerHTML = `<span class="cal-icon"><b>${currentMonth}</b><i>${currentDay}</i></span> Today`;
    }
    lastDay = currentDay;
  }
}

// Boot
setInterval(tick, 1000); 
tick();
loadData();
setInterval(() => loadData(), 60000); 
</script>
