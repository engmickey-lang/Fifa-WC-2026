name: Update Live Scores

on:
  schedule:
    - cron: '*/5 * * * *' # Backup trigger if the loop ever rests
  workflow_dispatch:      # Allows manual clicking if needed
  repository_dispatch:    # <-- NEW: Allows the script to wake itself up
    types: [loop_update]

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Fetch Script
        run: python fetch_scores.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add live_scores.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live scores" && git push)

      # THE MAGIC STEP: Send a secure message back to GitHub to start running again immediately!
      - name: Trigger Next Run Instantly
        if: always() # Runs even if the script skips a commit when there's no new score
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "loop_update"}'
